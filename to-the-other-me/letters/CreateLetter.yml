info:
  name: CreateLetter
  type: http
  seq: 1

http:
  method: POST
  url: "{{URI}}/api/v1/letters"
  body:
    type: json
    data: |
      {
        "firstname" : "test"
      }
  auth: inherit

runtime:
  variables:
    - name: URI
      value: http://localhost:8080

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
